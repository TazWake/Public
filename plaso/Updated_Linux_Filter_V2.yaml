#   - '/home/[^/]+/[.]local/share/recently-used[.]xbel([.-].+)?'
#   - '/home/[^/]+/[.]local/share/zeitgeist'
#
# ---
# description: Desktop module: browser history (Firefox/Chrome/Chromium)
# type: include
# paths:
#   # Firefox
#   - '/home/[^/]+/[.]mozilla/firefox/[^/]+/places[.]sqlite'
