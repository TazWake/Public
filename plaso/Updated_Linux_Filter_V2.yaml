# filter_linux.yaml
# Targeted collection filter for Plaso on Linux disk images (server-first).
#
# Design goals:
# - High-value intrusion artefacts with low-to-medium I/O by default.
# - Journald included but easy to exclude (it can be huge).
# - Optional modules for desktop GUI endpoints, web stacks, containers, DBs.
#
# Notes:
# - Patterns are regular expressions.
# - Prefer directory-level includes for recursion (Plaso includes subdirs).
# - Optional blocks are commented out; remove leading "#" to enable.
#
# Recommended starting parsers:
#   --parsers linux
# (Then tune with exclusions, e.g. --parsers "linux,!webhist" for server-only.)

---
description: Core server: auth + system logs (syslog/rsyslog family)
type: include
paths:
  # Debian/Ubuntu style
  - '/var/log/auth[.]log([.-].+)?'
  - '/var/log/syslog([.-].+)?'
  - '/var/log/kern[.]log([.-].+)?'
  - '/var/log/daemon[.]log([.-].+)?'

  # RHEL/SUSE style
  - '/var/log/secure([.-].+)?'
  - '/var/log/messages([.-].+)?'
  - '/var/log/cron([.-].+)?'
  - '/var/log/boot[.]log([.-].+)?'

  # Other common tools
  - '/var/log/faillog([.-].+)?'
  - '/var/log/fail2ban[.]log([.-].+)?'

---
description: Core server: systemd journal (high volume, high value)
type: include
paths:
  # Persistent journals (if enabled)
  - '/var/log/journal'
  # Volatile journals (often absent in disk images, but safe)
  - '/run/log/journal'

---
description: Core server: auditd / audit.log + audit configuration
type: include
paths:
  - '/var/log/audit'
  - '/etc/audit'
  - '/etc/audit/rules[.]d'

---
description: Core server: login accounting (utmp/wtmp/btmp/lastlog)
type: include
paths:
  - '/var/run/utmp'
  - '/run/utmp'
  - '/var/log/wtmp'
  - '/var/log/btmp'
  - '/var/log/lastlog'

---
description: Core server: scheduling & persistence (cron, anacron, systemd overrides)
type: include
paths:
  # Cron / anacron
  - '/etc/crontab'
  - '/etc/cron[.]d'
  - '/etc/cron[.]hourly'
  - '/etc/cron[.]daily'
  - '/etc/cron[.]weekly'
  - '/etc/cron[.]monthly'
  - '/etc/anacrontab'
  - '/var/spool/cron'
  - '/var/spool/cron/crontabs'

  # systemd persistence / overrides (prefer /etc over /usr/lib for signal)
  - '/etc/systemd/system'
  - '/etc/systemd/user'
  - '/etc/systemd/system[.]conf'
  - '/etc/systemd/user[.]conf'

  # Legacy init (still shows up in real incidents)
  - '/etc/rc[.]local'
  - '/etc/init[.]d'
  - '/etc/rc[0-6S][.]d'

---
description: Core server: remote access + privilege + auth configuration
type: include
paths:
  - '/etc/ssh'
  - '/etc/sudoers'
  - '/etc/sudoers[.]d'
  - '/etc/pam[.]d'
  - '/etc/login[.]defs'
  - '/etc/security'
  - '/etc/hosts'
  - '/etc/hosts[.]allow'
  - '/etc/hosts[.]deny'
  - '/etc/resolv[.]conf'
  - '/etc/nsswitch[.]conf'
  - '/etc/passwd'
  - '/etc/shadow'
  - '/etc/group'
  - '/etc/gshadow'

---
description: Core server: logging pipeline configuration (trust boundaries for logs)
type: include
paths:
  - '/etc/rsyslog[.]conf'
  - '/etc/rsyslog[.]d'
  - '/etc/systemd/journald[.]conf'
  - '/etc/systemd/journald[.]conf[.]d'
  - '/etc/logrotate[.]conf'
  - '/etc/logrotate[.]d'

---
description: Core server: dynamic linker hijack indicators (low volume, very high value)
type: include
paths:
  - '/etc/ld[.]so[.]preload'
  - '/etc/ld[.]so[.]conf'
  - '/etc/ld[.]so[.]conf[.]d'
  - '/etc/ld[.]so[.]cache'

---
description: Core server: package management/software change artefacts
type: include
paths:
  # Debian-family
  - '/var/log/dpkg[.]log([.-].+)?'
  - '/var/log/apt/history[.]log([.-].+)?'
  - '/var/log/apt/term[.]log([.-].+)?'
  - '/var/log/aptitude([.-].+)?'
  - '/etc/apt'
  - '/etc/apt/apt[.]conf'
  - '/etc/apt/apt[.]conf[.]d'

  # RHEL-family (DNF/YUM)
  - '/var/log/dnf([.].+)?'
  - '/var/log/yum[.]log([.-].+)?'
  - '/etc/dnf'
  - '/etc/yum[.]conf'
  - '/etc/yum[.]repos[.]d'

  # SUSE-family (zypp)
  - '/var/log/zypp/history'
  - '/var/log/zypper[.]log([.-].+)?'
  - '/etc/zypp'
  - '/etc/zypp/zypp[.]conf'
  - '/etc/zypp/zypp[.]conf[.]d'

---
description: Core server: user activity (shell history + SSH keys + user-level systemd)
type: include
paths:
  # Root (always worth it)
  - '/root/[.]bash_history'
  - '/root/[.]zsh_history'
  - '/root/[.]local/share/fish/fish_history'
  - '/root/[.]ssh'
  - '/root/[.]config/systemd/user'

  # Common user homes (server-safe default; avoids sweeping whole /home)
  - '/home/[^/]+/[.]bash_history'
  - '/home/[^/]+/[.]zsh_history'
  - '/home/[^/]+/[.]local/share/fish/fish_history'
  - '/home/[^/]+/[.]ssh'
  - '/home/[^/]+/[.]config/systemd/user'

# ---------------------------------------------------------------------------
# OPTIONAL: If journald is killing performance, enable this exclusion block.
# (Excludes apply after includes; see Plaso ordering rules.)
#
# ---
# description: Optional: exclude systemd journal for speed
# type: exclude
# paths:
#   - '/var/log/journal'
#   - '/run/log/journal'

# ---------------------------------------------------------------------------
# OPTIONAL MODULE: Desktop / GUI endpoint artefacts (FOR577-style endpoints)
